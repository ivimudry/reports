        <script>
          // Capture all anchor clicks and prevent default behavior.
          // Instead, fire the event over the message bridge
          document.addEventListener('click', (event) => {
            const anchor = findAnchor(event.target);

            if (anchor) {
              event.preventDefault();

              // Prepare options for message.openUrl
              const options = {
                target: anchor.target ?? '_self', // Use target attribute or default to _self
                name: clip(anchor.getAttribute('data-tracked-name') ?? anchor.href, 100),
              };

              // Add rel attribute to options if it exists
              if (anchor.rel) {
                options.rel = anchor.rel;
              }

              // Fire across the message bridge
              message.openUrl(anchor.href, options);
            }
          });

          function findAnchor(node) {
            while (node && node.nodeName.toUpperCase() !== 'A') {
              node = node.parentNode; // SVG <a> elements have a lowercase name
            }
            return node;
          }

          function clip(str, n) {
            if (typeof str !== 'string') {
              return '';
            }

            return str.length > n ? str.substring(0, n) : str;
          }
        </script>
